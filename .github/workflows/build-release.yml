name: Build Tiny Neighborhood binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, 1.0.0"
        required: false
        default: "1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux Tk runtime/build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build binaries
        env:
          TINY_NEIGHBORHOOD_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version }}
        run: |
          python scripts/build_binaries.py --clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-neighborhood-${{ matrix.os }}
          path: release/*.zip

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.zip
          generate_release_notes: true
