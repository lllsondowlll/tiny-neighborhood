name: Build Tiny Neighborhood binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.1.0"
        required: false
        default: "0.1.0"
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linux Tk runtime/build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build binaries
        env:
          TINY_NEIGHBORHOOD_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          python scripts/build_binaries.py --clean

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: tiny-neighborhood-${{ matrix.os }}
          path: release/*.zip
